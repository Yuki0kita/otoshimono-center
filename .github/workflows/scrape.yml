name: daily-scrape

on:
  schedule:
    # JST 06:30（UTC 21:30）に毎日実行
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1"
      PORTAL_BASE_URL: ${{ vars.PORTAL_BASE_URL }}
      PORTAL_PROXY_TOKEN: ${{ secrets.PORTAL_PROXY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run scraper
        run: python -m scraper.run --days 3
      - name: Commit updated data
        run: |
          git config user.name "otoshimono-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/items.json site/data/items.json
          git diff --cached --quiet || git commit -m "data: 拾得物データを更新"
          git push
