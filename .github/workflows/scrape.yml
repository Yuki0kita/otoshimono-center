name: daily-scrape

on:
  schedule:
    # JST 06:30（UTC 21:30）に毎日実行
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scraper
        run: python -m scraper.run --days 3
      - name: Commit updated data
        run: |
          git config user.name "otoshimono-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/items.json site/data/items.json
          git diff --cached --quiet || git commit -m "data: 拾得物データを更新"
          git push
